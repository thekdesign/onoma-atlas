<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0.4" y2="1">
            <stop offset="0" stop-color="#FFF6FB"/>
            <stop offset="0.5" stop-color="#F4F0FF"/>
            <stop offset="1" stop-color="#EAF7FF"/>
        </linearGradient>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF6BB5"/>
            <stop offset="0.5" stop-color="#9B78FF"/>
            <stop offset="1" stop-color="#4FB0FF"/>
        </linearGradient>
        <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FF8FC8"/>
            <stop offset="1" stop-color="#B49AFF"/>
        </linearGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#sky)"/>

    <!-- 柔光暈 -->
    <circle cx="120" cy="90" r="220" fill="#FFB8DC" opacity="0.35"/>
    <circle cx="1090" cy="120" r="240" fill="#A6DBFF" opacity="0.35"/>
    <circle cx="980" cy="560" r="200" fill="#CDBCFF" opacity="0.35"/>

    <!-- 星星 -->
    <g fill="#FFD45E">
        <path d="M150 360 l9 19 21 3 -15 15 4 21 -19 -10 -19 10 4 -21 -15 -15 21 -3 z"/>
        <path d="M1050 380 l6 13 14 2 -10 10 2 14 -12 -7 -12 7 2 -14 -10 -10 14 -2 z"/>
    </g>

    <!-- 標題 -->
    <text x="600" y="250" text-anchor="middle" font-family="'Baloo 2','M PLUS Rounded 1c','Noto Sans TC',sans-serif"
          font-size="92" font-weight="800" fill="url(#grad)">世界擬聲詞圖鑑</text>
    <text x="600" y="312" text-anchor="middle" font-family="'JetBrains Mono',monospace"
          font-size="30" letter-spacing="10" fill="#9488B5">ONOMA · ATLAS OF WORLD SOUNDS</text>

    <!-- 三國說法膠囊 -->
    <g font-family="'M PLUS Rounded 1c','Noto Sans TC',sans-serif" font-weight="800" font-size="40">
        <g transform="translate(330,400)">
            <rect x="0" y="0" width="170" height="78" rx="39" fill="#FFFFFF" opacity="0.85"/>
            <text x="85" y="52" text-anchor="middle" fill="#2C2640">🇹🇼 汪汪</text>
        </g>
        <g transform="translate(515,400)">
            <rect x="0" y="0" width="200" height="78" rx="39" fill="url(#pill)"/>
            <text x="100" y="52" text-anchor="middle" fill="#FFFFFF">🇯🇵 ワンワン</text>
        </g>
        <g transform="translate(730,400)">
            <rect x="0" y="0" width="150" height="78" rx="39" fill="#FFFFFF" opacity="0.85"/>
            <text x="75" y="52" text-anchor="middle" fill="#2C2640">🇰🇷 멍멍</text>
        </g>
    </g>

    <text x="600" y="556" text-anchor="middle" font-family="'Noto Sans TC',sans-serif"
          font-size="30" fill="#6E6191">同一個聲音，各國怎麼唸？翻牌卡片 · 點一下用該國語言發聲 🫧</text>
</svg>
